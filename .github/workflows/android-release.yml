name: Android APK Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Sync Android project
        working-directory: frontend
        run: npm run android:build

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Prepare release artifact
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/debug/app-debug.apk "release/Codex-Bridge-${GITHUB_REF_NAME}-debug.apk"
          sha256sum "release/Codex-Bridge-${GITHUB_REF_NAME}-debug.apk" > "release/Codex-Bridge-${GITHUB_REF_NAME}-debug.apk.sha256"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Codex Bridge ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release/Codex-Bridge-${{ github.ref_name }}-debug.apk
            release/Codex-Bridge-${{ github.ref_name }}-debug.apk.sha256
